#!/usr/sbin/nft -f
# Gong-NG appliance firewall: allow SSH/HTTP/DHCP/DNS/mDNS on the AP
# interface, drop other inbound. Install as /etc/nftables.conf.
flush ruleset

table inet filter {
    chain input {
        type filter hook input priority 0; policy drop;
        iif "lo" accept
        ct state established,related accept
        ip protocol icmp accept
        ip6 nexthdr ipv6-icmp accept
        tcp dport { 22, 80 } accept
        udp dport { 67, 53, 5353 } accept
        tcp dport 53 accept
    }
    chain forward {
        type filter hook forward priority 0; policy drop;
    }
    chain output {
        type filter hook output priority 0; policy accept;
    }
}
